name: CI Quality Gate

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write # Required to surface coverage reports in PR comments

jobs:
  editor-tests:
    runs-on: ubuntu-latest
    steps:
      - name: 🏁 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            editor/package-lock.json
            editor/dashboard/package-lock.json

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Python Dependencies
        # Added pytest-cov here so npm run test:all (which triggers python) doesn't error
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio pytest-cov discord.py python-dotenv requests

      - name: 📦 Install Root Dependencies
        run: npm install

      - name: 🏗️ Install Sub-project Dependencies
        run: |
          npm install --prefix editor
          npm install --prefix editor/dashboard

      - name: 🧪 Run All Unit Tests
        run: npm run test:all

      - name: 📊 Surface Node Coverage Summary
        if: github.event_name == 'pull_request'
        run: |
          echo "### 🟢 Node.js Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "Coverage reports generated for Editor and Dashboard." >> $GITHUB_STEP_SUMMARY

      - name: 🧹 Docker Environment Check
        run: |
          docker build -t test-editor ./editor
          docker build -t test-bot .

  bot-tests:
    runs-on: ubuntu-latest
    steps:
      - name: 🏁 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Bot Dependencies
        run: |
          python -m pip install --upgrade pip
          # Standardizing on pytest-cov for CI coverage surfacing
          pip install pytest pytest-asyncio pytest-cov discord.py python-dotenv requests

      - name: 🧪 Run Bot Unit Tests
        run: npm run test:bot
#        run: PYTHONPATH=. pytest tests/

      - name: 📊 Surface Python Coverage
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: ./coverage.xml
          title: 🐍 Python Bot Coverage
          badge-title: Bot Coverage
          hide-badge: false
          hide-report: false
          create-new-comment: false

  test-suite:
    runs-on: ubuntu-latest
    # This job will only start if both previous jobs pass
    needs: [editor-tests, bot-tests]
    steps:
      - name: Success
        run: echo "All quality checks and coverage reports passed. Ready for merge."
