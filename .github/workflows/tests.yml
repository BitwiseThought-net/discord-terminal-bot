name: CI Quality Gate

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  editor-tests:
    runs-on: ubuntu-latest
    steps:
      - name: 🏁 Checkout Repository
        uses: actions/checkout@v4 #

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm' #
          cache-dependency-path: |
            package-lock.json
            editor/package-lock.json
            editor/dashboard/package-lock.json

      - name: 📦 Install Root Dependencies
        run: npm install

      - name: 🏗️ Install Sub-project Dependencies
        # This reaches into both folders to ensure test runners are ready
        run: |
          npm install --prefix editor
          npm install --prefix editor/dashboard

      - name: 🧪 Run All Unit Tests
        # Leverages your Root Orchestrator script
        run: npm run test:all

      - name: 🧹 Docker Environment Check
        # Optional: Verifies that the Dockerfiles can at least be parsed
        run: |
          docker build -t test-editor ./editor
          docker build -t test-bot .
  # --- New Job for the Python Bot ---
  bot-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Bot Dependencies
        run: |
          python -m pip install --upgrade pip
          # This ensures 'pytest' exists when npm calls it
          pip install pytest pytest-asyncio discord.py python-dotenv requests
      - name: Run Bot Logic Unit Tests
        run: npm run test:bot
#        run: PYTHONPATH=. pytest tests/

  test-suite:
    runs-on: ubuntu-latest
    # This job will only start if both previous jobs pass
    needs: [editor-tests, bot-tests]
    steps:
      - name: Success
        run: echo "All quality checks passed. Ready for merge."
