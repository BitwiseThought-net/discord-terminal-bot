name: Deploy via SSH

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Optional: Ensure unit tests pass before deploying
    # needs: [test_job_name] 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 10722
          # Update these commands based on how your bot is hosted (e.g., pm2, systemd, or docker)
          script: |
            cd /deploy/discord-terminal-bot
            git pull origin main
            /deploy/discord-terminal-bot/commands/build.sh
